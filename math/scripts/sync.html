<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Graph Sync</title>
  <style>
    :root {
      --ink: #19211f;
      --muted: #566660;
      --line: #cad7d1;
      --paper: #f4f5f1;
      --panel: #ffffff;
      --mint: #d9f2e0;
      --leaf: #22684d;
      --leaf-soft: #9fcaaf;
      --amber: #f4e2b9;
      --amber-ink: #7a5b16;
      --coral: #efb2a4;
      --coral-ink: #a33a29;
      --terminal: #0f1714;
      --terminal-ink: #dfe8e2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(217, 242, 224, 0.9), transparent 32%),
        linear-gradient(180deg, #fbfcfa 0%, var(--paper) 100%);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    main {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 48px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.15;
    }

    .hint {
      margin: 0 0 28px;
      max-width: 820px;
      color: var(--muted);
      line-height: 1.75;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 18px;
    }

    .panel {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 14px 34px rgba(25, 33, 31, 0.06);
      backdrop-filter: blur(6px);
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .config {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 14px;
      color: var(--muted);
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--ink);
      background: var(--panel);
      font: inherit;
    }

    .checks {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .checks label {
      grid-template-columns: 18px 1fr;
      align-items: start;
      gap: 10px;
      color: var(--ink);
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    button {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      text-align: left;
      font: inherit;
      transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
    }

    button strong {
      display: block;
      margin-bottom: 4px;
      font-size: 16px;
    }

    button span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: var(--leaf);
      box-shadow: 0 10px 24px rgba(34, 104, 77, 0.12);
    }

    button.primary {
      background: var(--mint);
      border-color: var(--leaf-soft);
    }

    button.warning {
      background: #fff8ea;
      border-color: #ebd497;
    }

    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .status {
      margin-bottom: 14px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      color: var(--muted);
      line-height: 1.6;
    }

    .status.ok {
      border-color: var(--leaf-soft);
      color: var(--leaf);
    }

    .status.warn {
      border-color: var(--amber);
      color: var(--amber-ink);
    }

    .status.error {
      border-color: var(--coral);
      color: var(--coral-ink);
    }

    .meta {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 8px 14px;
      margin-bottom: 14px;
      padding: 14px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .meta dt {
      color: var(--muted);
    }

    .meta dd {
      margin: 0;
      overflow-wrap: anywhere;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
    }

    pre {
      min-height: 460px;
      margin: 0;
      padding: 16px;
      overflow: auto;
      border-radius: 14px;
      background: var(--terminal);
      color: var(--terminal-ink);
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    @media (max-width: 880px) {
      main {
        width: min(100% - 24px, 1040px);
        padding-top: 24px;
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Math Markdown / JSON Sync</h1>
    <p class="hint">
      先看差异，再决定是否写入。这个页面通过本地 Flask 服务调用脚本库，适合手工同步
      Markdown 笔记、<code>math.json</code>、以及关系修复检查。
    </p>

    <section class="layout">
      <aside class="panel">
        <h2>配置</h2>
        <div class="config">
          <label>
            服务地址
            <input id="endpoint" type="text" value="http://127.0.0.1:5000/function">
          </label>
          <label>
            Markdown 根目录
            <input id="markdownFolder" type="text" value="D:/Algo/Notes/math_physics/math/">
          </label>
          <label>
            JSON 文件
            <input id="jsonFile" type="text" value="D:/Algo/Notes/math_physics/math/lib/math.json">
          </label>
          <label>
            索引文件
            <input id="indexFile" type="text" value="D:/Algo/Notes/math_physics/math/lib/math.index.json">
          </label>
        </div>

        <div class="checks">
          <label>
            <input id="dryRun" type="checkbox" checked>
            <span>预演模式。先看计划，不直接写文件。</span>
          </label>
          <label>
            <input id="prune" type="checkbox">
            <span>导出 Markdown 时清理多余的旧文件。</span>
          </label>
          <label>
            <input id="dropBroken" type="checkbox">
            <span>修复时删除损坏引用，而不是保留它们。</span>
          </label>
        </div>

        <div class="controls">
          <button class="warning" id="diffButton" type="button">
            <strong>检查差异</strong>
            <span>比较 Markdown 和 JSON，列出新增、缺失和变更的概念。</span>
          </button>
          <button class="primary" id="markdownToJson" type="button">
            <strong>Markdown 写入 JSON</strong>
            <span>从笔记重建 <code>math.json</code>，并更新路径索引。</span>
          </button>
          <button id="jsonToMarkdown" type="button">
            <strong>JSON 写入 Markdown</strong>
            <span>从 <code>math.json</code> 回写概念笔记，可选清理陈旧文件。</span>
          </button>
          <button id="validateButton" type="button">
            <strong>验证结构</strong>
            <span>检查单边关系、标签不一致和损坏引用。</span>
          </button>
          <button id="repairButton" type="button">
            <strong>修复关系</strong>
            <span>按 children 或 parents 侧重重建镜像关系。</span>
          </button>
        </div>
      </aside>

      <section class="panel">
        <h2>执行结果</h2>
        <div class="status" id="status">等待操作。</div>
        <dl class="meta">
          <dt>Endpoint</dt>
          <dd id="metaEndpoint"></dd>
          <dt>Markdown</dt>
          <dd id="metaMarkdown"></dd>
          <dt>JSON</dt>
          <dd id="metaJson"></dd>
          <dt>Index</dt>
          <dd id="metaIndex"></dd>
        </dl>
        <pre id="log" aria-label="执行日志"></pre>
      </section>
    </section>
  </main>

  <script>
    const buttons = Array.from(document.querySelectorAll("button"));
    const statusNode = document.getElementById("status");
    const logNode = document.getElementById("log");

    function getConfig() {
      return {
        endpoint: document.getElementById("endpoint").value.trim(),
        markdownFolder: document.getElementById("markdownFolder").value.trim(),
        jsonFile: document.getElementById("jsonFile").value.trim(),
        indexFile: document.getElementById("indexFile").value.trim(),
        dryRun: document.getElementById("dryRun").checked,
        prune: document.getElementById("prune").checked,
        dropBroken: document.getElementById("dropBroken").checked
      };
    }

    function refreshMeta() {
      const config = getConfig();
      document.getElementById("metaEndpoint").textContent = config.endpoint;
      document.getElementById("metaMarkdown").textContent = config.markdownFolder;
      document.getElementById("metaJson").textContent = config.jsonFile;
      document.getElementById("metaIndex").textContent = config.indexFile;
    }

    function setBusy(isBusy) {
      buttons.forEach((button) => {
        button.disabled = isBusy;
      });
    }

    function setStatus(message, type = "") {
      statusNode.textContent = message;
      statusNode.className = `status${type ? ` ${type}` : ""}`;
    }

    function appendLog(message) {
      logNode.textContent += `${message}\n`;
      logNode.scrollTop = logNode.scrollHeight;
    }

    async function callService(label, functionName, params, okType = "ok") {
      refreshMeta();
      const config = getConfig();
      setBusy(true);
      setStatus(`${label} 进行中...`);
      appendLog(`[${new Date().toLocaleString()}] ${label}`);
      appendLog(`function: ${functionName}`);
      appendLog(`params: ${JSON.stringify(params, null, 2)}`);

      try {
        const response = await fetch(config.endpoint, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            function: functionName,
            params
          })
        });

        const payload = await response.json().catch(() => null);
        if (!response.ok || !payload || payload.status !== "success") {
          const message = payload && payload.message ? payload.message : `HTTP ${response.status}`;
          throw new Error(message);
        }

        setStatus(`${label} 完成。`, okType);
        appendLog("status: success");
        appendLog(JSON.stringify(payload.data, null, 2));
      } catch (error) {
        setStatus(`${label} 失败：${error.message}`, "error");
        appendLog(`error: ${error.message}`);
      } finally {
        appendLog("");
        setBusy(false);
      }
    }

    document.getElementById("diffButton").addEventListener("click", () => {
      const config = getConfig();
      callService("检查差异", "diff_graph", {
        folder_path: config.markdownFolder,
        json_path: config.jsonFile
      }, "warn");
    });

    document.getElementById("markdownToJson").addEventListener("click", () => {
      const config = getConfig();
      callService("Markdown 写入 JSON", "import_markdown", {
        folder_path: config.markdownFolder,
        output_path: config.jsonFile,
        dry_run: config.dryRun,
        index_path: config.indexFile
      });
    });

    document.getElementById("jsonToMarkdown").addEventListener("click", () => {
      const config = getConfig();
      callService("JSON 写入 Markdown", "export_markdown", {
        json_file: config.jsonFile,
        output_dir: config.markdownFolder,
        dry_run: config.dryRun,
        prune: config.prune,
        index_path: config.indexFile
      });
    });

    document.getElementById("validateButton").addEventListener("click", () => {
      const config = getConfig();
      callService("验证结构", "validate_graph", {
        path: config.jsonFile
      }, "warn");
    });

    document.getElementById("repairButton").addEventListener("click", () => {
      const config = getConfig();
      callService("修复关系", "repair_graph", {
        path: config.jsonFile,
        apply: !config.dryRun,
        prefer: "children",
        drop_broken: config.dropBroken
      }, config.dryRun ? "warn" : "ok");
    });

    refreshMeta();
    appendLog("Ready.");
  </script>
</body>
</html>
