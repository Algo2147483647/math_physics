<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Graph Sync</title>
  <style>
    :root {
      --page: #f5f5f7;
      --window: #ffffff;
      --toolbar: #fbfbfc;
      --surface: #f8f8fa;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --line: #d7d7dc;
      --line-soft: #e7e7eb;
      --blue: #0066cc;
      --blue-soft: #e8f2ff;
      --green: #16744c;
      --green-soft: #eaf6ef;
      --amber: #8a5a00;
      --amber-soft: #fff7e5;
      --red: #b42318;
      --red-soft: #fff1f0;
      --code-bg: #151517;
      --code-text: #e9e9ec;
      --shadow: 0 18px 55px rgba(0, 0, 0, 0.12);
      --focus: 0 0 0 3px rgba(0, 102, 204, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--page);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Arial, sans-serif;
      font-size: 14px;
    }

    main {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
      padding: 30px 0 42px;
    }

    .window {
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 14px;
      background: var(--window);
      box-shadow: var(--shadow);
    }

    .titlebar {
      display: grid;
      grid-template-columns: 84px minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      min-height: 54px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line-soft);
      background: var(--toolbar);
    }

    .traffic {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .traffic span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.12);
    }

    .close {
      background: #ff5f57;
    }

    .minimize {
      background: #ffbd2e;
    }

    .zoom {
      background: #28c840;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      overflow: hidden;
      font-size: 15px;
      font-weight: 650;
      letter-spacing: 0;
      line-height: 1.3;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .content {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      min-height: 680px;
    }

    .sidebar {
      border-right: 1px solid var(--line-soft);
      background: #f7f7f9;
    }

    .workspace {
      background: var(--window);
    }

    .section {
      padding: 18px;
    }

    .section + .section {
      border-top: 1px solid var(--line-soft);
    }

    h2 {
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .stack {
      display: grid;
      gap: 13px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    input[type="text"],
    select {
      width: 100%;
      min-height: 34px;
      padding: 6px 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--text);
      background: #fff;
      box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.03);
      font: inherit;
      font-size: 13px;
    }

    input[type="text"]:focus,
    select:focus {
      outline: none;
      border-color: rgba(0, 102, 204, 0.55);
      box-shadow: var(--focus);
    }

    .checks {
      display: grid;
      gap: 9px;
    }

    .check {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
    }

    input[type="checkbox"] {
      width: 14px;
      height: 14px;
      margin: 2px 0 0;
      accent-color: var(--blue);
    }

    .actions {
      display: grid;
      gap: 8px;
    }

    button {
      min-height: 34px;
      padding: 7px 11px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: linear-gradient(#ffffff, #f4f4f6);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      box-shadow: 0 1px 1px rgba(0, 0, 0, 0.04);
    }

    button:hover:not(:disabled) {
      border-color: #b9b9bf;
      background: linear-gradient(#ffffff, #ededf0);
    }

    button:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    button:disabled {
      opacity: 0.58;
      cursor: wait;
    }

    .toolbar-button {
      min-width: 112px;
      border-color: rgba(0, 102, 204, 0.3);
      color: var(--blue);
    }

    .primary {
      border-color: rgba(0, 102, 204, 0.45);
      background: linear-gradient(#0a84ff, #0066cc);
      color: #fff;
    }

    .primary:hover:not(:disabled) {
      border-color: rgba(0, 102, 204, 0.65);
      background: linear-gradient(#0877e6, #005ec0);
    }

    .danger {
      color: var(--red);
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--line-soft);
    }

    .result-header h2 {
      margin: 0;
    }

    .status {
      min-height: 38px;
      margin: 0 0 14px;
      padding: 9px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      line-height: 1.45;
    }

    .status.ok {
      border-color: rgba(22, 116, 76, 0.24);
      background: var(--green-soft);
      color: var(--green);
    }

    .status.warn {
      border-color: rgba(138, 90, 0, 0.24);
      background: var(--amber-soft);
      color: var(--amber);
    }

    .status.error {
      border-color: rgba(180, 35, 24, 0.24);
      background: var(--red-soft);
      color: var(--red);
    }

    .meta {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 8px 12px;
      margin: 0 0 14px;
      padding: 12px;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: var(--surface);
    }

    .meta dt {
      color: var(--muted);
      font-weight: 600;
    }

    .meta dd {
      min-width: 0;
      margin: 0;
      overflow-wrap: anywhere;
      font-family: "SFMono-Regular", Consolas, "Courier New", monospace;
      font-size: 12px;
    }

    .capabilities {
      min-height: 30px;
      margin-bottom: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .capabilities code {
      display: inline-block;
      margin: 0 5px 6px 0;
      padding: 2px 7px;
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      font-family: "SFMono-Regular", Consolas, "Courier New", monospace;
      font-size: 12px;
    }

    pre {
      min-height: 430px;
      max-height: 60vh;
      margin: 0;
      padding: 14px;
      overflow: auto;
      border-radius: 8px;
      background: var(--code-bg);
      color: var(--code-text);
      font-family: "SFMono-Regular", Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    @media (max-width: 900px) {
      main {
        width: min(100% - 20px, 1160px);
        padding-top: 18px;
      }

      .titlebar {
        grid-template-columns: 72px minmax(0, 1fr);
      }

      .toolbar-button {
        grid-column: 1 / -1;
        justify-self: stretch;
      }

      .content {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line-soft);
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="window">
      <header class="titlebar">
        <div class="traffic" aria-hidden="true">
          <span class="close"></span>
          <span class="minimize"></span>
          <span class="zoom"></span>
        </div>
        <h1>Math Graph Sync</h1>
        <button class="toolbar-button" id="serviceButton" type="button">Check Service</button>
      </header>

      <section class="content">
        <aside class="sidebar">
          <section class="section">
            <h2>Paths</h2>
            <div class="stack">
              <label>
                Service Endpoint
                <input id="endpoint" type="text" value="http://127.0.0.1:5000/function">
              </label>
              <label>
                Markdown Root
                <input id="markdownFolder" type="text" value="D:/Algo/Notes/math_physics/math/">
              </label>
              <label>
                JSON File
                <input id="jsonFile" type="text" value="D:/Algo/Notes/math_physics/math/lib/math.json">
              </label>
              <label>
                Index File
                <input id="indexFile" type="text" value="D:/Algo/Notes/math_physics/math/lib/math.index.json">
              </label>
              <label>
                Repair Source
                <select id="prefer">
                  <option value="children">Rebuild parents from children</option>
                  <option value="parents">Rebuild children from parents</option>
                </select>
              </label>
            </div>
          </section>

          <section class="section">
            <h2>Options</h2>
            <div class="checks">
              <label class="check">
                <input id="dryRun" type="checkbox" checked>
                <span>Dry run</span>
              </label>
              <label class="check">
                <input id="prune" type="checkbox">
                <span>Prune stale Markdown files</span>
              </label>
              <label class="check">
                <input id="dropBroken" type="checkbox">
                <span>Drop broken references during repair</span>
              </label>
            </div>
          </section>

          <section class="section">
            <h2>Actions</h2>
            <div class="actions">
              <button id="diffButton" type="button">Diff Markdown and JSON</button>
              <button class="primary" id="markdownToJson" type="button">Import Markdown to JSON</button>
              <button id="jsonToMarkdown" type="button">Export JSON to Markdown</button>
              <button id="validateButton" type="button">Validate Graph</button>
              <button class="danger" id="repairButton" type="button">Repair Relations</button>
            </div>
          </section>
        </aside>

        <section class="workspace">
          <div class="result-header">
            <h2>Result</h2>
          </div>
          <div class="section">
            <div class="status" id="status">Idle.</div>
            <dl class="meta">
              <dt>Endpoint</dt>
              <dd id="metaEndpoint"></dd>
              <dt>Markdown</dt>
              <dd id="metaMarkdown"></dd>
              <dt>JSON</dt>
              <dd id="metaJson"></dd>
              <dt>Index</dt>
              <dd id="metaIndex"></dd>
            </dl>
            <div class="capabilities" id="capabilities">Service not checked.</div>
            <pre id="log" aria-label="Execution log"></pre>
          </div>
        </section>
      </section>
    </div>
  </main>

  <script>
    const buttons = Array.from(document.querySelectorAll("button"));
    const statusNode = document.getElementById("status");
    const logNode = document.getElementById("log");
    const capabilitiesNode = document.getElementById("capabilities");

    const requiredFunctions = [
      "diff_graph",
      "import_markdown",
      "export_markdown",
      "validate_graph",
      "repair_graph"
    ];

    function getConfig() {
      return {
        endpoint: document.getElementById("endpoint").value.trim(),
        markdownFolder: document.getElementById("markdownFolder").value.trim(),
        jsonFile: document.getElementById("jsonFile").value.trim(),
        indexFile: document.getElementById("indexFile").value.trim(),
        prefer: document.getElementById("prefer").value,
        dryRun: document.getElementById("dryRun").checked,
        prune: document.getElementById("prune").checked,
        dropBroken: document.getElementById("dropBroken").checked
      };
    }

    function paramsWithIndex(params, indexFile) {
      if (!indexFile) {
        return params;
      }
      return { ...params, index_path: indexFile };
    }

    function refreshMeta() {
      const config = getConfig();
      document.getElementById("metaEndpoint").textContent = config.endpoint || "<empty>";
      document.getElementById("metaMarkdown").textContent = config.markdownFolder || "<empty>";
      document.getElementById("metaJson").textContent = config.jsonFile || "<empty>";
      document.getElementById("metaIndex").textContent = config.indexFile || "<empty>";
    }

    function setBusy(isBusy) {
      buttons.forEach((button) => {
        button.disabled = isBusy;
      });
    }

    function setStatus(message, type = "") {
      statusNode.textContent = message;
      statusNode.className = `status${type ? ` ${type}` : ""}`;
    }

    function appendLog(message) {
      logNode.textContent += `${message}\n`;
      logNode.scrollTop = logNode.scrollHeight;
    }

    function prettyJson(value) {
      return JSON.stringify(value, null, 2);
    }

    function renderCapabilities(functions) {
      const fragment = document.createDocumentFragment();

      functions
        .filter((name) => requiredFunctions.includes(name))
        .forEach((name) => {
          const code = document.createElement("code");
          code.textContent = name;
          fragment.append(code);
        });

      capabilitiesNode.replaceChildren(fragment);
    }

    function getServiceBase() {
      const endpoint = getConfig().endpoint;
      const url = new URL(endpoint);
      url.pathname = url.pathname.replace(/\/function\/?$/, "");
      url.search = "";
      url.hash = "";
      return url.toString().replace(/\/$/, "");
    }

    async function readJsonResponse(response) {
      const text = await response.text();
      if (!text) {
        return null;
      }

      try {
        return JSON.parse(text);
      } catch (error) {
        return { status: "error", message: text };
      }
    }

    async function checkService() {
      refreshMeta();
      setBusy(true);
      setStatus("Checking service...");

      try {
        const base = getServiceBase();
        const [healthResponse, functionsResponse] = await Promise.all([
          fetch(`${base}/health`),
          fetch(`${base}/functions`)
        ]);

        const health = await readJsonResponse(healthResponse);
        const functionsPayload = await readJsonResponse(functionsResponse);
        const functions = Array.isArray(functionsPayload?.data) ? functionsPayload.data : [];
        const missing = requiredFunctions.filter((name) => !functions.includes(name));

        if (!healthResponse.ok || !functionsResponse.ok || missing.length > 0) {
          throw new Error(missing.length > 0 ? `Missing service functions: ${missing.join(", ")}` : "Unexpected service response");
        }

        renderCapabilities(functions);
        setStatus(`Service ready: ${health?.service || "math-tools"}`, "ok");
        appendLog(`[${new Date().toLocaleString()}] service ok`);
        appendLog(prettyJson({ health, functions: functionsPayload.data }));
        appendLog("");
      } catch (error) {
        capabilitiesNode.textContent = "Service unavailable or incomplete.";
        setStatus(`Service check failed: ${error.message}`, "error");
        appendLog(`[${new Date().toLocaleString()}] service error`);
        appendLog(String(error.message));
        appendLog("");
      } finally {
        setBusy(false);
      }
    }

    async function callService(label, functionName, params, okType = "ok") {
      refreshMeta();
      const config = getConfig();

      if (!config.endpoint) {
        setStatus("Service endpoint is required.", "error");
        return;
      }

      setBusy(true);
      setStatus(`${label} in progress...`);
      appendLog(`[${new Date().toLocaleString()}] ${label}`);
      appendLog(`function: ${functionName}`);
      appendLog(`params: ${prettyJson(params)}`);

      try {
        const response = await fetch(config.endpoint, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            function: functionName,
            params
          })
        });

        const payload = await readJsonResponse(response);
        if (!response.ok || !payload || payload.status !== "success") {
          const message = payload?.message || `HTTP ${response.status}`;
          throw new Error(message);
        }

        setStatus(`${label} complete.`, okType);
        appendLog("status: success");
        appendLog(prettyJson(payload.data));
      } catch (error) {
        setStatus(`${label} failed: ${error.message}`, "error");
        appendLog(`error: ${error.message}`);
      } finally {
        appendLog("");
        setBusy(false);
      }
    }

    document.getElementById("serviceButton").addEventListener("click", checkService);

    document.getElementById("diffButton").addEventListener("click", () => {
      const config = getConfig();
      callService("Diff", "diff_graph", {
        folder_path: config.markdownFolder,
        json_path: config.jsonFile
      }, "warn");
    });

    document.getElementById("markdownToJson").addEventListener("click", () => {
      const config = getConfig();
      callService("Import Markdown to JSON", "import_markdown", paramsWithIndex({
        folder_path: config.markdownFolder,
        output_path: config.jsonFile,
        dry_run: config.dryRun
      }, config.indexFile));
    });

    document.getElementById("jsonToMarkdown").addEventListener("click", () => {
      const config = getConfig();
      callService("Export JSON to Markdown", "export_markdown", paramsWithIndex({
        json_file: config.jsonFile,
        output_dir: config.markdownFolder,
        dry_run: config.dryRun,
        prune: config.prune
      }, config.indexFile));
    });

    document.getElementById("validateButton").addEventListener("click", () => {
      const config = getConfig();
      callService("Validate Graph", "validate_graph", {
        path: config.jsonFile
      }, "warn");
    });

    document.getElementById("repairButton").addEventListener("click", () => {
      const config = getConfig();
      callService("Repair Relations", "repair_graph", {
        path: config.jsonFile,
        apply: !config.dryRun,
        prefer: config.prefer,
        drop_broken: config.dropBroken
      }, config.dryRun ? "warn" : "ok");
    });

    document.querySelectorAll("input, select").forEach((node) => {
      node.addEventListener("input", refreshMeta);
      node.addEventListener("change", refreshMeta);
    });

    refreshMeta();
    appendLog("Ready.");
  </script>
</body>
</html>
